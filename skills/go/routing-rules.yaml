# 编排层工具路由规则 v3.0 — ZCode 纯血版
# 使用 Feature Branch + Git Worktree 实现并发编码隔离
#
# 匹配规则: 从上往下,首个命中的规则生效

routing:
  # ─── 主力执行: ZCode --prompt (80%+ 场景) ───
  - match:
      task_type: [backend, api, crud, test, testing, refactor, 
                  database, config, migration, fix, docs, 
                  documentation, readme, changelog, frontend, 
                  ui, page, component, css, animation,
                  architecture, review, audit, design-review]
    tool: zcode
    mode: worktree_concurrent      # 新: worktree 隔离 + 并发
    skill_required: null           # 由 go SKILL.md 注入
    fallback: zcode_serial         # 降级: 串行执行
    completion_signal: git_commit  # 完成信号: git commit

  # ─── 降级: ZCode 串行(worktree 不可用时的兜底) ───
  - match:
      task_type: "*"
    tool: zcode
    mode: serial
    skill_required: null
    fallback: deepseek_direct

# ─── ZCode CLI 调用配置 ───
zcode_cli:
  path: "C:/Users/admin/AppData/Local/Programs/ZCode/resources/glm/zcode.cjs"
  exec_template: "node {path} --prompt \"{task}\" --cwd {project} --mode yolo"
  default_mode: "yolo"
  model: "4f14f683-2d01-4ee4-802f-51bdfc87cc5b/deepseek-v4-pro-260425"

# ─── Worktree 配置 ───
worktree:
  base_dir: ".go/worktrees"       # worktree 根目录(相对于项目根)
  branch_prefix: "go-"            # worktree 分支名前缀
  max_concurrent: 4               # 最大并发数
  auto_cleanup: true              # 完成后自动清理 worktree

# ─── DeepSeek 降级配置 ───
deepseek:
  provider_config:
    kind: "openai-compatible"
    baseURL: "https://api.deepseek.com"
    model_main: "deepseek-chat"
