# go v5.0 — Worker Contract runtime routing
# worktree 隔离由 go 编排器掌控；sub-agent 通过统一 WorkerTaskPacket 执行

runtimes:
  cursor:
    adapter: subagent
    default_subagent_role: general-purpose
  zcode:
    adapter: subagent
    default_subagent_role: general-purpose
    cli_fallback_path: "${ZCODE_CLI_PATH}"

worktree:
  base_dir: ".go/worktrees"
  branch_prefix: "go-"
  max_concurrent: 4
  auto_cleanup: true

retry:
  max_retries: 2
  delays: [2, 8]
  triggers:
    - "429"
    - "quota_exceeded"
    - "insufficient_quota"
    - "rate_limit"

model_hints:
  fast: "use fastest available model"
  standard: "inherit default"
  capable: "use most capable model"
