    <text x="760" y="1485" text-anchor="middle" font-size="14" font-weight="bold" fill="#311b92">🛟 DeepSeek 兜底层 (终极降级 · deepseek-v4-pro/flash · 独立API key)</text>
    <text x="760" y="1510" text-anchor="middle" font-size="11" fill="#555">双通道: 方案A(config切换,保留ZCode工具) + 方案C(API直连,零干扰) · 执行时不打断,验收时透明化标记</text>
    <line x1="760" y1="1440" x2="760" y2="1460" stroke="#512da8" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arP)"/>
    <text x="775" y="1455" font-size="9" font-weight="bold" fill="#512da8">429/quota</text>

    <!-- ============ 交付层 ============ -->
    <rect x="0" y="1555" width="1520" height="60" rx="8" fill="#e0f2f1" stroke="#00695c" stroke-width="2"/>
    <text x="760" y="1580" text-anchor="middle" font-size="14" font-weight="bold" fill="#004d40">📦 交付层</text>
    <text x="760" y="1602" text-anchor="middle" font-size="12" fill="#333">验收报告 + 代码合并/PR + 经验回写 loop 经验库</text>

    <!-- ============ 右侧附属说明框区 (x:1540-2080) ============ -->
    <text x="1810" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">📋 7大机制附属说明</text>

    <!-- 附属框1: Repomix+jCodeMunch+Headroom 详解 -->
    <rect x="1540" y="60" width="540" height="180" rx="8" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
    <text x="1810" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064">① 三工具省Token 详解</text>
    <line x1="1560" y1="95" x2="2060" y2="95" stroke="#006064" stroke-width="1"/>
    <text x="1560" y="115" font-size="10" font-weight="bold" fill="#00838f">协同防线 (互补不重叠):</text>
    <text x="1560" y="133" font-size="10" fill="#333">任务启动 → Repomix打包全库喂Agent</text>
    <text x="1560" y="148" font-size="10" fill="#333">         → 精简全局视野(删冗余/结构化)</text>
    <text x="1560" y="166" font-size="10" fill="#333">执行中 → 需看代码 → jCodeMunch按符号取</text>
    <text x="1560" y="181" font-size="10" fill="#333">         → 不读全文件(省97%)</text>
    <text x="1560" y="199" font-size="10" fill="#333">工具输出 → Headroom压缩后喂LLM</text>
    <text x="1560" y="214" font-size="10" fill="#333">         → 日志/JSON/代码压缩(60-95%)</text>
    <text x="1560" y="232" font-size="9" fill="#666" font-style="italic">接入: ZCode已装,重启即用(MCP/CLI)</text>

    <!-- 附属框2: 技能注入 -->
    <rect x="1540" y="255" width="540" height="170" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <text x="1810" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">② 技能注入机制 (skill-hub)</text>
    <line x1="1560" y1="290" x2="2060" y2="290" stroke="#6a1b9a" stroke-width="1"/>
    <text x="1560" y="310" font-size="10" font-weight="bold" fill="#7b1fa2">编排层派发任务时自动注入技能:</text>
    <text x="1560" y="328" font-size="10" fill="#333">拆分任务 → skill-router匹配56个技能</text>
    <text x="1560" y="343" font-size="10" fill="#333">         → 技能内容注入subagent prompt</text>
    <text x="1560" y="363" font-size="10" font-weight="bold" fill="#7b1fa2">匹配规则示例:</text>
    <text x="1560" y="380" font-size="10" fill="#333">写测试 → testing-patterns / TDD</text>
    <text x="1560" y="395" font-size="10" fill="#333">修Bug → systematic-debugging</text>
    <text x="1560" y="410" font-size="10" fill="#333">重构 → refactoring / clean-code</text>
    <text x="1560" y="418" font-size="9" fill="#666" font-style="italic">每个subagent带着专家知识干活</text>

    <!-- 附属框3: 断点恢复三重保障 -->
    <rect x="1540" y="440" width="540" height="270" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="1810" y="465" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">③ 断点恢复机制 (三重保障)</text>
    <line x1="1560" y1="475" x2="2060" y2="475" stroke="#e65100" stroke-width="1"/>

    <text x="1560" y="495" font-size="10" font-weight="bold" fill="#ef6c00">A. 检查点 (每步持久化)</text>
    <text x="1560" y="510" font-size="10" fill="#333">每子任务→立即写状态文件</text>
    <text x="1560" y="524" font-size="10" fill="#333">记录:任务ID/已完成/进行中/剩余/上下文</text>

    <text x="1560" y="546" font-size="10" font-weight="bold" fill="#ef6c00">B. 自动恢复 (重启即续跑)</text>
    <text x="1560" y="561" font-size="10" fill="#333">启动→检测状态文件是否存在</text>
    <text x="1560" y="575" font-size="10" fill="#333">未完成→验证产物→跳过已完成→续跑</text>

    <text x="1560" y="597" font-size="10" font-weight="bold" fill="#ef6c00">C. 错误分类+自动重试</text>
    <text x="1560" y="612" font-size="10" fill="#333">网络断联 → 指数退避重试(3次)→续跑</text>
    <text x="1560" y="626" font-size="10" fill="#333">token耗尽 → 自动降级DeepSeek→续跑</text>
    <text x="1560" y="640" font-size="10" fill="#333">模型切换 → 切备选模型→续跑</text>
    <text x="1560" y="654" font-size="10" fill="#333">进程崩溃 → git reset回滚→重新执行</text>

    <text x="1560" y="676" font-size="10" font-weight="bold" fill="#c62828">★ 原子性: in_progress任务记git HEAD</text>
    <text x="1560" y="690" font-size="10" fill="#333">中断→恢复时reset到HEAD→重执行(无半成品)</text>
    <text x="1560" y="704" font-size="9" fill="#666" font-style="italic">解决: 网络断联/token耗尽/模型切换中断</text>

    <!-- 附属框4: 双轨制状态文件 -->
    <rect x="1540" y="725" width="540" height="130" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="1810" y="750" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">④ 双轨制状态文件</text>
    <line x1="1560" y1="760" x2="2060" y2="760" stroke="#2e7d32" stroke-width="1"/>
    <text x="1560" y="780" font-size="10" font-weight="bold" fill="#2e7d32">宏观调度层:</text>
    <text x="1560" y="795" font-size="10" fill="#333">.orchestrate-state.json</text>
    <text x="1560" y="809" font-size="10" fill="#333">管: 哪些子任务/分给谁/依赖关系/断点</text>
    <text x="1560" y="828" font-size="10" font-weight="bold" fill="#2e7d32">微观闭环层:</text>
    <text x="1560" y="843" font-size="10" fill="#333">.loop-state-*.json (复用loop)</text>
    <text x="1560" y="857" font-size="9" fill="#666" font-style="italic">两层职责清晰,互不污染</text>

    <!-- 附属框5: Cursor半自动协作 -->
    <rect x="1540" y="870" width="540" height="160" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="1810" y="895" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">⑤ Cursor半自动协作 (v1)</text>
    <line x1="1560" y1="905" x2="2060" y2="905" stroke="#1565c0" stroke-width="1"/>
    <text x="1560" y="925" font-size="10" font-weight="bold" fill="#1565c0">流程:</text>
    <text x="1560" y="940" font-size="10" fill="#333">编排层遇前端任务 → 暂停+记录git HEAD</text>
    <text x="1560" y="955" font-size="10" fill="#333">→ 提示: "请在Cursor完成并commit"</text>
    <text x="1560" y="970" font-size="10" fill="#333">→ 轮询检测git变化</text>
    <text x="1560" y="985" font-size="10" fill="#333">→ 检测到commit → 编排层自动续跑</text>
    <text x="1560" y="1005" font-size="10" font-weight="bold" fill="#1565c0">完成信号: git commit (唯一可靠真相)</text>
    <text x="1560" y="1020" font-size="9" fill="#666" font-style="italic">避免文件轮询误判半成品</text>

    <!-- 附属框6: 上下文交接协议 -->
    <rect x="1540" y="1040" width="540" height="180" rx="8" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
    <text x="1810" y="1065" text-anchor="middle" font-size="13" font-weight="bold" fill="#01579b">⑥ 上下文交接协议</text>
    <line x1="1560" y1="1075" x2="2060" y2="1075" stroke="#0277bd" stroke-width="1"/>
    <text x="1560" y="1095" font-size="10" font-weight="bold" fill="#0277bd">问题: 子任务跨工具执行,上下文易丢失</text>
    <text x="1560" y="1113" font-size="10" font-weight="bold" fill="#0277bd">解决: 结构化 handoff 摘要</text>
    <text x="1560" y="1130" font-size="10" fill="#333">子任务完成 → 输出交接摘要:</text>
    <text x="1560" y="1145" font-size="9" fill="#555">{files_changed, new_interfaces,</text>
    <text x="1560" y="1158" font-size="9" fill="#555"> git_commit, next_task_hint}</text>
    <text x="1560" y="1175" font-size="10" fill="#333">→ 写入状态文件 → 注入下个子任务</text>
    <text x="1560" y="1195" font-size="10" font-weight="bold" fill="#01579b">价值:</text>
    <text x="1560" y="1210" font-size="10" fill="#333">• 跨工具/模型上下文不丢失</text>
    <text x="1560" y="1225" font-size="10" fill="#333">• 只传摘要不传完整日志(省token)</text>
    <text x="1560" y="1240" font-size="10" fill="#333">• 摘要由完成任务的工具自己生成</text>

    <!-- 附属框7: 全局集成回归 -->
    <rect x="1540" y="1235" width="540" height="180" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
    <text x="1810" y="1260" text-anchor="middle" font-size="13" font-weight="bold" fill="#880e4f">⑦ 全局集成回归</text>
    <line x1="1560" y1="1270" x2="2060" y2="1270" stroke="#c2185b" stroke-width="1"/>
    <text x="1560" y="1290" font-size="10" font-weight="bold" fill="#c2185b">问题: 子任务各自门禁通过,但组合可能互相破坏</text>
    <text x="1560" y="1308" font-size="10" font-weight="bold" fill="#c2185b">解决: 所有子任务完成后一次性全量回归</text>
    <text x="1560" y="1325" font-size="10" fill="#333">T1✅T2✅T3✅ → 全局集成回归:</text>
    <text x="1560" y="1342" font-size="10" fill="#333">• 全量测试套件(不只单模块)</text>
    <text x="1560" y="1357" font-size="10" fill="#333">• 跨模块接口契约校验</text>
    <text x="1560" y="1372" font-size="10" fill="#333">• 前后端联调验证</text>
    <text x="1560" y="1387" font-size="10" fill="#333">• 复用 loop 门禁 G1-G8+F1-F5</text>
    <text x="1560" y="1407" font-size="10" font-weight="bold" fill="#c62828">失败 → 回退到失败子任务重做</text>
    <text x="1560" y="1422" font-size="9" fill="#666" font-style="italic">编排层是loop上层调度器,复用其门禁能力</text>

    <rect x="830" y="1678" width="14" height="14" rx="2" fill="#e3f2fd" stroke="#1565c0"/><text x="852" y="1690" font-size="11" fill="#333">★Cursor半自动</text>
    <rect x="970" y="1678" width="14" height="14" rx="2" fill="#e1f5fe" stroke="#0277bd"/><text x="992" y="1690" font-size="11" fill="#333">★上下文交接</text>
    <rect x="1100" y="1678" width="14" height="14" rx="2" fill="#fce4ec" stroke="#c2185b"/><text x="1122" y="1690" font-size="11" fill="#333">★全局集成回归</text>
    <rect x="1250" y="1678" width="14" height="14" rx="2" fill="#fce4ec" stroke="#ad1457"/><text x="1272" y="1690" font-size="11" fill="#333">★降级兜底</text>
    <rect x="1370" y="1678" width="14" height="14" rx="2" fill="#ede7f6" stroke="#512da8"/><text x="1392" y="1690" font-size="11" fill="#333">DeepSeek兜底</text>
