<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Browser 测试页面</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 10px 24px; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0051a8; }
    .result { margin-top: 20px; padding: 16px; border-radius: 4px; display: none; }
    .result.success { display: block; background: #e6ffed; border: 1px solid #34d058; }
    .result.error { display: block; background: #ffeef0; border: 1px solid #d73a49; }
    #item-list { list-style: none; padding: 0; }
    #item-list li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .delete-btn { background: #d73a49; padding: 4px 12px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Agent Browser 测试页面</h1>
  <p>此页面用于验证 agent-browser 的前端测试能力。</p>

  <form id="test-form">
    <div class="form-group">
      <label for="name">姓名</label>
      <input type="text" id="name" name="name" placeholder="请输入姓名" required>
    </div>
    <div class="form-group">
      <label for="email">邮箱</label>
      <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
    </div>
    <div class="form-group">
      <label for="type">类型</label>
      <select id="type" name="type">
        <option value="">请选择</option>
        <option value="bug">Bug 报告</option>
        <option value="feature">功能建议</option>
        <option value="question">问题咨询</option>
      </select>
    </div>
    <div class="form-group">
      <label for="message">留言</label>
      <textarea id="message" name="message" rows="3" placeholder="请输入留言内容"></textarea>
    </div>
    <button type="submit" id="submit-btn">提交</button>
    <button type="button" id="reset-btn" style="background:#666;margin-left:8px;">重置</button>
  </form>

  <div id="form-result" class="result"></div>

  <h2 style="margin-top:32px;">已提交列表</h2>
  <ul id="item-list"></ul>

  <script>
    // 模拟一个 console.warn（非 error，不应触发 F1）
    console.warn('This is a test warning - should not fail F1');

    document.getElementById('test-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const type = document.getElementById('type').value;
      const message = document.getElementById('message').value;

      const resultDiv = document.getElementById('form-result');

      if (!name || !email) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请填写必填字段（姓名和邮箱）';
        return;
      }

      // 添加到列表
      const li = document.createElement('li');
      li.innerHTML = `<span><strong>${name}</strong> (${type || '未分类'}) - ${message || '无留言'}</span>
        <button class="delete-btn" onclick="this.parentElement.remove()">删除</button>`;
      document.getElementById('item-list').appendChild(li);

      resultDiv.className = 'result success';
      resultDiv.textContent = `提交成功！欢迎 ${name}`;

      // 清空表单
      this.reset();
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
      document.getElementById('test-form').reset();
      document.getElementById('form-result').className = 'result';
    });
  </script>
</body>
</html>
